<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--color-bg-primary); font-family: var(--font-regular); display: flex; gap: 18px; align-items: flex-end; flex-wrap: wrap; }
  .u { text-align: center; }
  .bar { background: var(--color-accent); border-radius: 3px; width: 100%; }
  .b { width: 40px; }
  .l { margin-top: 8px; font-family: var(--font-monospace); font-size: 11px; color: var(--color-text-tertiary); }
</style>
</head>
<body>
  <div class="u b"><div class="bar" style="height:4px"></div><div class="l">4</div></div>
  <div class="u b"><div class="bar" style="height:8px"></div><div class="l">8</div></div>
  <div class="u b"><div class="bar" style="height:12px"></div><div class="l">12</div></div>
  <div class="u b"><div class="bar" style="height:16px"></div><div class="l">16</div></div>
  <div class="u b"><div class="bar" style="height:24px"></div><div class="l">24</div></div>
  <div class="u b"><div class="bar" style="height:32px"></div><div class="l">32</div></div>
  <div class="u b"><div class="bar" style="height:48px"></div><div class="l">48</div></div>
  <div class="u b"><div class="bar" style="height:64px"></div><div class="l">64</div></div>
</body>
</html>
