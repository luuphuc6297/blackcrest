<!-- @dsCard group="Spacing" viewport="700x180" name="Độ nổi (bóng)" subtitle="Tinh tế, ưu tiên viền hairline hơn bóng nặng" -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 30px; background: var(--color-bg-level-1); font-family: var(--font-regular); display: flex; gap: 30px; align-items: center; flex-wrap: wrap; }
  .u { text-align: center; }
  .card { width: 120px; height: 76px; background: var(--color-bg-primary); border-radius: var(--radius-card); border: 1px solid var(--color-border-translucent); }
  .l { margin-top: 12px; font-family: var(--font-monospace); font-size: 11px; color: var(--color-text-tertiary); }
</style>
</head>
<body>
  <div class="u"><div class="card" style="box-shadow:var(--shadow-low)"></div><div class="l">low</div></div>
  <div class="u"><div class="card" style="box-shadow:var(--shadow-medium)"></div><div class="l">medium</div></div>
  <div class="u"><div class="card" style="box-shadow:var(--shadow-high)"></div><div class="l">high</div></div>
  <div class="u"><div class="card" style="box-shadow:var(--shadow-stack-medium)"></div><div class="l">stack-medium</div></div>
</body>
</html>
