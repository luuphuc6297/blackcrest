<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px; background: var(--color-bg-primary); font-family: var(--font-monospace); font-feature-settings: "tnum"; color: var(--color-text-primary); }
  .big { font-size: 30px; font-weight: 500; letter-spacing: -0.01em; }
  .rows { margin-top: 14px; font-size: 14px; color: var(--color-text-secondary); }
  .r { display: flex; justify-content: space-between; max-width: 320px; padding: 3px 0; }
  .pos { color: var(--color-success); }
  .neg { color: var(--color-danger); }
</style>
</head>
<body>
  <div class="big">₫ 1.284.500.000</div>
  <div class="rows">
    <div class="r"><span>NAV / đơn vị</span><span>12.847,02</span></div>
    <div class="r"><span>Lợi nhuận YTD</span><span class="pos">+8,42%</span></div>
    <div class="r"><span>Biến động tháng</span><span class="neg">−1,07%</span></div>
  </div>
</body>
</html>
