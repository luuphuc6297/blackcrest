<!-- @dsCard group="Colors" viewport="700x180" name="Semantic & Status" subtitle="Thành công, cảnh báo, lỗi, thông tin" -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--color-bg-primary); font-family: var(--font-regular); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .pill { display: inline-flex; align-items: center; gap: 7px; padding: 6px 12px; border-radius: var(--radius-pill); font-size: var(--font-size-small); font-weight: var(--font-weight-medium); }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .swrow { display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
  .sw { width: 92px; }
  .chip { height: 40px; border-radius: var(--radius-6); }
  .name { margin-top: 6px; font-family: var(--font-monospace); font-size: 10px; color: var(--color-text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <span class="pill" style="background:var(--color-success-tint);color:var(--color-success)"><span class="dot" style="background:var(--color-success)"></span>Thành công</span>
    <span class="pill" style="background:var(--color-warning-tint);color:var(--color-warning)"><span class="dot" style="background:var(--color-warning)"></span>Cảnh báo</span>
    <span class="pill" style="background:var(--color-danger-tint);color:var(--color-danger)"><span class="dot" style="background:var(--color-danger)"></span>Lỗi</span>
    <span class="pill" style="background:var(--color-info-tint);color:var(--color-info)"><span class="dot" style="background:var(--color-info)"></span>Thông tin</span>
  </div>
  <div class="swrow">
    <div class="sw"><div class="chip" style="background:var(--color-green)"></div><div class="name">green</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-yellow)"></div><div class="name">yellow</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-orange)"></div><div class="name">orange</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-red)"></div><div class="name">red</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-blue)"></div><div class="name">blue</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-teal)"></div><div class="name">teal</div></div>
  </div>
</body>
</html>
