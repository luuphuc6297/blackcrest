<!-- @dsCard group="Spacing" viewport="700x170" name="Bo góc" subtitle="Control 6–8px · card 12–16px · pill tròn hoàn toàn" -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--color-bg-primary); font-family: var(--font-regular); display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; }
  .u { text-align: center; }
  .sq { width: 64px; height: 64px; background: var(--color-bg-level-2); border: 1px solid var(--color-border-secondary); }
  .l { margin-top: 8px; font-family: var(--font-monospace); font-size: 11px; color: var(--color-text-tertiary); }
</style>
</head>
<body>
  <div class="u"><div class="sq" style="border-radius:4px"></div><div class="l">4</div></div>
  <div class="u"><div class="sq" style="border-radius:6px"></div><div class="l">6 · control</div></div>
  <div class="u"><div class="sq" style="border-radius:8px"></div><div class="l">8</div></div>
  <div class="u"><div class="sq" style="border-radius:12px"></div><div class="l">12 · card</div></div>
  <div class="u"><div class="sq" style="border-radius:16px"></div><div class="l">16</div></div>
  <div class="u"><div class="sq" style="border-radius:9999px"></div><div class="l">full · pill</div></div>
</body>
</html>
