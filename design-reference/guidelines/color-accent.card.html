<!-- @dsCard group="Colors" viewport="700x190" name="Accent & Brand" subtitle="Monochrome — đen là màu thương hiệu duy nhất" -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--color-bg-primary); font-family: var(--font-regular); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 156px; }
  .chip { height: 64px; border-radius: var(--radius-8); border: 1px solid var(--color-border-translucent); }
  .name { margin-top: 8px; font-size: var(--font-size-small); font-weight: var(--font-weight-medium); color: var(--color-text-primary); }
  .val { font-family: var(--font-monospace); font-size: var(--font-size-mini); color: var(--color-text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-accent)"></div><div class="name">accent</div><div class="val">#16181d</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-accent-hover)"></div><div class="name">accent-hover</div><div class="val">#2c2f36</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-brand-bg)"></div><div class="name">brand-bg</div><div class="val">#0a0b0d</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-accent-tint)"></div><div class="name">accent-tint</div><div class="val">#f0f0f1</div></div>
  </div>
</body>
</html>
