"<!DOCTYPE html>\n<html lang=\"vi\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>BlackCrest — Liên hệ<\u002Ftitle>\n<style>/* Blackstone Design System — style entry.\n * Rendered designs receive only this file's @import closure, so the real\n * component CSS (tokens + base + components + responsive) is imported here. */\n/* ==========================================================================\n   Blackstone Design System — shared stylesheet\n   Tokens + base + components + responsive utilities\n   Extracted from blackstone.com (theme: blackstone-v2)\n   Brand fonts (Sanomat, Guardian Sans) are licensed by Blackstone; web-safe\n   fallbacks are used here for portable rendering.\n   ========================================================================== */\n\n/* ---- Tokens ---- */\n:root {\n  /* core */\n  --c-black:#000; --c-white:#fff; --c-variant-black:#202020; --c-yellow:#fdf147;\n  /* slate / grey */\n  --c-slate-1:#515256; --c-slate-2:#d5d8df; --c-slate-3:#f4f5f7;\n  --c-grey-100:#f8f8f8; --c-grey-200:#dcdbdc; --c-grey-300:#a3aaae;\n  --c-gray-1:#949494; --c-gray:#dcdfe5; --c-dark-gray:#353a46;\n  /* highlight */\n  --c-highlight-light:#f4f5f7; --c-highlight-light-active:#e7eaee;\n  --c-highlight-dark:#121317; --c-highlight-dark-active:#24262d;\n  /* secondary ramps */\n  --c-avocado-1:#2e5f53; --c-avocado-2:#3d7f6f; --c-avocado-3:#b7d9d1;\n  --c-emerald-1:#164b4a; --c-emerald-2:#1b5e5c; --c-emerald-3:#a4bfbe;\n  --c-cobalt-1:#005075;  --c-cobalt-2:#006492;  --c-cobalt-3:#99c1d3;\n  --c-chartreuse-1:#42520e; --c-chartreuse-2:#637b16; --c-chartreuse-3:#dbeba7;\n  --c-copper:#a95228; --c-copper-400:#a95228;\n  --c-taupe-1:#4e3f30; --c-taupe-2:#9c7e60; --c-taupe-3:#e7d8c9;\n  /* semantic */\n  --c-red:#b80000; --c-light-green:#069e08;\n  /* roles (light) */\n  --c-copy:var(--c-black); --c-background:var(--c-white); --c-border:var(--c-black);\n  --c-link:var(--c-black); --c-footnote:var(--c-grey-300);\n  /* type */\n  --f-serif:\"Sanomat\",Georgia,\"Times New Roman\",serif;\n  --f-sans:\"Guardian Sans\",-apple-system,BlinkMacSystemFont,\"Helvetica Neue\",Arial,sans-serif;\n  --f-mono:sfmono-regular,menlo,monaco,consolas,\"Liberation Mono\",\"Courier New\",monospace;\n  --fw-light:300; --fw-regular:400; --fw-medium:500; --fw-semibold:600;\n  --fw-bold:700; --fw-extrabold:800; --fw-black:900;\n  /* fluid type scale */\n  --fs-12:.75rem; --fs-14:.875rem; --fs-16:1rem; --fs-18:1.125rem; --fs-20:1.25rem;\n  --fs-24:1.5rem; --fs-30:1.875rem; --fs-32:2rem; --fs-36:2.25rem; --fs-40:2.5rem;\n  --fs-display-sm:clamp(2rem, 4vw, 3rem);\n  --fs-display:clamp(2.5rem, 6vw, 5rem);\n  --fs-display-lg:clamp(3rem, 8vw, 7rem);\n  /* spacing (8px rhythm) */\n  --spacing-8:.5rem; --spacing-12:.75rem; --spacing-16:1rem; --spacing-20:1.25rem;\n  --spacing-24:1.5rem; --spacing-32:2rem; --spacing-40:2.5rem; --spacing-48:3rem;\n  --spacing-56:3.5rem; --spacing-64:4rem; --spacing-80:5rem; --spacing-96:6rem; --spacing-128:8rem;\n  /* layout */\n  --container:1648px; --container-narrow:1136px; --gutter:clamp(1.25rem, 4vw, 4rem);\n  /* motion */\n  --ease-expo:cubic-bezier(.19,1,.22,1); --ease-soft:cubic-bezier(.16,1,.3,1);\n  --dur-fast:.2s; --dur-base:.3s;\n  /* shape */\n  --radius:0;\n}\n\n/* ---- Reset / base ---- */\n*,*::before,*::after{box-sizing:border-box}\nhtml{-webkit-text-size-adjust:100%}\nbody{\n  margin:0; background:var(--c-background); color:var(--c-copy);\n  font-family:var(--f-sans); font-weight:var(--fw-light); font-size:var(--fs-16);\n  line-height:1.5; -webkit-font-smoothing:antialiased; -webkit-tap-highlight-color:rgba(0,0,0,0);\n}\nimg{max-width:100%;display:block}\na{color:inherit}\n\n/* ---- Headings ---- */\nh1,h2,h3,h4{font-weight:var(--fw-light);margin:0}\n.display{font-family:var(--f-serif);font-weight:var(--fw-light);line-height:1.02;letter-spacing:-.0625rem}\n.display-lg{font-size:var(--fs-display-lg)}\n.display-md{font-size:var(--fs-display)}\n.display-sm{font-size:var(--fs-display-sm)}\n.serif{font-family:var(--f-serif)}\n.eyebrow{\n  font-size:var(--fs-12); text-transform:uppercase; letter-spacing:.08em;\n  font-weight:var(--fw-medium); color:var(--c-slate-1); margin:0 0 var(--spacing-16);\n}\n.eyebrow .dot{display:inline-block;width:.5rem;height:.5rem;background:var(--c-yellow);margin-right:.55rem;vertical-align:middle}\n.lede{font-size:var(--fs-20);max-width:46ch}\n.muted{color:var(--c-slate-1)}\nmark.hl{background:linear-gradient(transparent 62%, var(--c-yellow) 62%);color:inherit;padding:0 .08em}\n\n/* ---- Layout ---- */\n.container{max-width:var(--container);margin:0 auto;padding-inline:var(--gutter)}\n.container.narrow{max-width:var(--container-narrow)}\n.section{padding-block:clamp(3.5rem,8vw,8rem)}\n.rule{height:1px;background:var(--c-black);border:0;margin:0}\n.grid{display:grid;gap:var(--spacing-32)}\n.cols-2{grid-template-columns:repeat(2,1fr)}\n.cols-3{grid-template-columns:repeat(3,1fr)}\n.cols-4{grid-template-columns:repeat(4,1fr)}\n.stack > * + *{margin-top:var(--spacing-24)}\n\n/* ---- Links (animated underline) ---- */\n.link{\n  display:inline;color:inherit;text-decoration:none;\n  background-image:linear-gradient(currentColor,currentColor);\n  background-position:0 100%;background-repeat:no-repeat;background-size:0 1px;\n  transition:background-size var(--dur-base) var(--ease-expo);\n}\n.link:hover,.link:focus-visible{background-size:100% 1px}\n.link--static{background-size:100% 1px}\n.arrow-link{\n  display:inline-flex;align-items:center;gap:.5rem;text-decoration:none;color:inherit;\n  font-size:var(--fs-14);text-transform:uppercase;letter-spacing:.04em;font-weight:var(--fw-medium);\n}\n.arrow-link .arrow{transition:transform var(--dur-base) var(--ease-expo)}\n.arrow-link:hover .arrow{transform:translateX(.35rem)}\n\n/* ---- Buttons ---- */\n.btn{\n  --bg:var(--c-black); --fg:var(--c-white);\n  display:inline-flex;align-items:center;gap:.6rem;justify-content:center;\n  padding:.9rem 1.6rem;border:1px solid var(--bg);border-radius:var(--radius);\n  background:var(--bg);color:var(--fg);cursor:pointer;\n  font-family:var(--f-sans);font-size:var(--fs-14);font-weight:var(--fw-medium);\n  text-transform:uppercase;letter-spacing:.04em;text-decoration:none;\n  transition:background var(--dur-base) var(--ease-expo),color var(--dur-base) var(--ease-expo),border-color var(--dur-base) var(--ease-expo);\n}\n.btn:hover{background:transparent;color:var(--bg)}\n.btn--ghost{--bg:var(--c-black);background:transparent;color:var(--c-black)}\n.btn--ghost:hover{background:var(--c-black);color:var(--c-white)}\n.btn--invert{--bg:var(--c-white);--fg:var(--c-black)}\n.btn--invert:hover{background:transparent;color:var(--c-white);border-color:var(--c-white)}\n.btn--yellow{--bg:var(--c-yellow);--fg:var(--c-black);border-color:var(--c-yellow)}\n.btn--yellow:hover{background:transparent;color:var(--c-black)}\n\n/* ---- Focus (brand yellow) ---- */\n:where(a,button,input,textarea,select,[tabindex]):focus-visible{\n  outline:.25rem solid var(--c-yellow);outline-offset:2px;\n}\n\n/* ---- Forms ---- */\n.field{display:flex;flex-direction:column;gap:.5rem;margin-bottom:var(--spacing-20)}\n.field label{font-size:var(--fs-12);text-transform:uppercase;letter-spacing:.06em;font-weight:var(--fw-medium)}\n.field input,.field textarea,.field select{\n  font-family:var(--f-sans);font-size:var(--fs-16);font-weight:var(--fw-light);\n  padding:.85rem 1rem;border:1px solid var(--c-slate-2);border-radius:var(--radius);\n  background:var(--c-white);color:var(--c-black);transition:border-color var(--dur-fast) ease;\n}\n.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--c-black)}\n\n/* ---- Content card ---- */\n.card{display:flex;flex-direction:column;background:var(--c-white);border-top:1px solid var(--c-black);padding-top:var(--spacing-20)}\n.card .kicker{font-size:var(--fs-12);text-transform:uppercase;letter-spacing:.06em;color:var(--c-slate-1);margin-bottom:var(--spacing-12)}\n.card h3{font-family:var(--f-serif);font-size:var(--fs-24);margin-bottom:var(--spacing-12)}\n.card p{font-size:var(--fs-16);color:#333;margin:0 0 var(--spacing-20)}\n.card .media{aspect-ratio:4/3;background:var(--c-slate-3);margin-bottom:var(--spacing-16);overflow:hidden}\n.card .media.dark{background:var(--c-highlight-dark)}\n.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--spacing-40)}\n\n/* ---- Stat ---- */\n.stat{border-top:1px solid var(--c-black);padding-top:var(--spacing-16)}\n.stat .num{font-family:var(--f-serif);font-size:var(--fs-display-sm);line-height:1}\n.stat .num .unit{color:var(--c-copper-400)}\n.stat .label{font-size:var(--fs-14);color:var(--c-slate-1);margin-top:var(--spacing-8)}\n\n/* ---- Table ---- */\n.bx-table{width:100%;border-collapse:collapse;font-size:var(--fs-14)}\n.bx-table thead th{background:var(--c-black);color:var(--c-white);text-align:left;\n  padding:.85rem 1rem;text-transform:uppercase;letter-spacing:.04em;font-weight:var(--fw-medium);font-size:var(--fs-12)}\n.bx-table tbody td{padding:.85rem 1rem;border-bottom:1px solid var(--c-slate-2)}\n.bx-table tbody tr:nth-child(even){background:var(--c-grey-100)}\n.bx-table .sort{color:var(--c-copper-400)}\n\n/* ---- Site header ---- */\n.site-header{position:sticky;top:0;z-index:50;background:var(--c-white);border-bottom:1px solid var(--c-black)}\n.site-header .bar{display:flex;align-items:center;gap:var(--spacing-32);min-height:72px}\n.brand{font-family:var(--f-serif);font-size:var(--fs-20);font-weight:var(--fw-regular);letter-spacing:.02em;text-decoration:none;color:var(--c-black)}\n.site-nav{display:flex;gap:var(--spacing-24);margin-left:auto;align-items:center}\n.site-nav a{font-size:var(--fs-14);text-decoration:none;color:var(--c-black);padding:.25rem 0}\n.lang-switch{display:inline-flex;border:1px solid var(--c-black);margin-left:var(--spacing-8)}\n.lang-switch button{background:transparent;border:0;padding:.4rem .7rem;cursor:pointer;\n  font-family:var(--f-sans);font-size:var(--fs-12);font-weight:var(--fw-medium);text-transform:uppercase;letter-spacing:.04em}\n.lang-switch button[aria-pressed=\"true\"]{background:var(--c-yellow);color:var(--c-black)}\n.nav-toggle{display:none;margin-left:auto;background:transparent;border:1px solid var(--c-black);padding:.5rem .7rem;cursor:pointer;font-size:var(--fs-12);text-transform:uppercase;letter-spacing:.04em}\n\n/* ---- Site footer ---- */\n.site-footer{background:var(--c-black);color:var(--c-white);padding-block:var(--spacing-64) var(--spacing-32)}\n.site-footer a{color:var(--c-white);text-decoration:none}\n.site-footer .cols{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:var(--spacing-40)}\n.site-footer h4{font-size:var(--fs-12);text-transform:uppercase;letter-spacing:.06em;color:var(--c-grey-300);margin:0 0 var(--spacing-16);font-weight:var(--fw-medium)}\n.site-footer ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:.6rem;font-size:var(--fs-14)}\n.site-footer .legal{margin-top:var(--spacing-48);padding-top:var(--spacing-24);border-top:1px solid var(--c-dark-gray);\n  display:flex;justify-content:space-between;gap:var(--spacing-24);font-size:var(--fs-12);color:var(--c-grey-300);flex-wrap:wrap}\n\n/* ---- Hero ---- */\n.hero{border-bottom:1px solid var(--c-black)}\n.hero .inner{padding-block:clamp(3rem,7vw,7rem)}\n.hero .display{margin:var(--spacing-24) 0 var(--spacing-32)}\n\n/* ---- Utilities ---- */\n.flex{display:flex} .between{justify-content:space-between} .items-center{align-items:center}\n.gap-16{gap:var(--spacing-16)} .gap-24{gap:var(--spacing-24)} .wrap{flex-wrap:wrap}\n.mt-16{margin-top:var(--spacing-16)} .mt-24{margin-top:var(--spacing-24)} .mt-40{margin-top:var(--spacing-40)}\n.text-uppercase{text-transform:uppercase;letter-spacing:.06em}\n.bg-slate{background:var(--c-slate-3)} .bg-dark{background:var(--c-black);color:var(--c-white)}\n.bg-dark .eyebrow,.bg-dark .muted{color:var(--c-grey-300)}\n.tag{display:inline-block;font-size:var(--fs-12);border:1px solid currentColor;padding:.3rem .6rem;text-transform:uppercase;letter-spacing:.04em}\n\n/* ---- Responsive ---- */\n@media (max-width:64em){\n  .site-footer .cols{grid-template-columns:1fr 1fr}\n  .card-grid{grid-template-columns:repeat(2,1fr)}\n}\n@media (max-width:48em){\n  .site-nav{display:none;position:absolute;left:0;right:0;top:100%;flex-direction:column;\n    align-items:flex-start;background:var(--c-white);border-bottom:1px solid var(--c-black);padding:var(--gutter);gap:var(--spacing-16)}\n  .site-nav.open{display:flex}\n  .nav-toggle{display:inline-block}\n  .cols-2,.cols-3,.cols-4{grid-template-columns:1fr}\n  .card-grid{grid-template-columns:1fr}\n  .site-footer .cols{grid-template-columns:1fr}\n  .lede{font-size:var(--fs-18)}\n}\n\n<\u002Fstyle>\n<style>/* BlackCrest — site-specific styles layered on the Blackstone design system.\n   Only patterns the DS bundle doesn't already provide live here. */\n\n/* ---- Image placeholders (replace with real images later) ---- */\n.ph{\n  position:relative;\n  background:\n    repeating-linear-gradient(45deg,#eef0f3 0,#eef0f3 11px,#e3e6eb 11px,#e3e6eb 22px);\n  overflow:hidden;\n}\n.ph::after{\n  content:attr(data-label);\n  position:absolute;inset:0;\n  display:flex;align-items:center;justify-content:center;text-align:center;\n  font-family:var(--f-mono);font-size:11px;line-height:1.5;letter-spacing:.12em;\n  text-transform:uppercase;color:var(--c-slate-1);padding:1.25rem;\n}\n.ph.dark{\n  background:\n    repeating-linear-gradient(45deg,#15171c 0,#15171c 11px,#1d2027 11px,#1d2027 22px);\n}\n.ph.dark::after{color:var(--c-grey-300)}\n.card .media.ph{margin-bottom:var(--spacing-16)}\n\n/* ---- Insights: filter chips ---- */\n.filters{display:flex;gap:var(--spacing-12);flex-wrap:wrap;margin-bottom:var(--spacing-48)}\n.filters button{\n  background:transparent;border:1px solid var(--c-black);padding:.45rem .9rem;cursor:pointer;\n  font-family:var(--f-sans);font-size:var(--fs-12);text-transform:uppercase;letter-spacing:.04em;\n  font-weight:var(--fw-medium);transition:background var(--dur-fast) ease,color var(--dur-fast) ease;\n}\n.filters button:hover{background:var(--c-highlight-light-active,#e7eaee)}\n.filters button.active{background:var(--c-black);color:var(--c-white)}\n.filters button.active:hover{background:var(--c-black)}\n\n/* ---- Insights: featured lead ---- */\n.feature{\n  display:grid;grid-template-columns:1.2fr 1fr;gap:var(--spacing-48);align-items:center;\n  border-top:1px solid var(--c-black);padding-top:var(--spacing-32);margin-bottom:var(--spacing-64);\n}\n.feature .media{aspect-ratio:16/10}\n@media (max-width:48em){.feature{grid-template-columns:1fr}}\n\n/* ---- Contact: office list ---- */\n.office{border-top:1px solid var(--c-black);padding-block:var(--spacing-20)}\n.office:last-of-type{border-bottom:1px solid var(--c-black)}\n.office h4{font-family:var(--f-serif);font-size:var(--fs-20);margin:0 0 .35rem;font-weight:var(--fw-regular)}\n.office p{margin:0;color:var(--c-slate-1);font-size:var(--fs-14)}\n\n/* ---- Article: editorial measure ---- */\n.measure{max-width:68ch}\n.measure p{font-size:var(--fs-18);line-height:1.6;margin:0 0 var(--spacing-24)}\n.measure h2{font-family:var(--f-serif);font-size:var(--fs-30);margin:var(--spacing-48) 0 var(--spacing-16);font-weight:var(--fw-light)}\n.pull{\n  font-family:var(--f-serif);font-weight:var(--fw-light);font-size:var(--fs-30);line-height:1.25;\n  border-left:3px solid var(--c-yellow);padding-left:var(--spacing-24);margin:var(--spacing-48) 0;color:var(--c-black);\n}\n.article-head{border-bottom:1px solid var(--c-black)}\n.byline{display:flex;gap:var(--spacing-16);flex-wrap:wrap;font-size:var(--fs-14);color:var(--c-slate-1);\n  text-transform:uppercase;letter-spacing:.04em}\n\n/* ---- Strategies: index rows ---- */\n.strat{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:var(--spacing-32);\n  border-top:1px solid var(--c-black);padding-block:var(--spacing-32);text-decoration:none;color:inherit;\n  transition:padding-left var(--dur-base) var(--ease-expo);}\n.strat:last-of-type{border-bottom:1px solid var(--c-black)}\n.strat:hover{padding-left:var(--spacing-16)}\n.strat .idx{font-family:var(--f-mono);font-size:var(--fs-14);color:var(--c-slate-1)}\n.strat h3{font-family:var(--f-serif);font-size:var(--fs-32);font-weight:var(--fw-light);margin:0}\n.strat p{margin:.4rem 0 0;color:var(--c-slate-1);font-size:var(--fs-16);max-width:54ch}\n.strat .arrow{font-size:var(--fs-24);transition:transform var(--dur-base) var(--ease-expo)}\n.strat:hover .arrow{transform:translateX(.4rem)}\n@media (max-width:48em){\n  .strat{grid-template-columns:auto 1fr;gap:var(--spacing-16)}\n  .strat .arrow{display:none}\n  .strat h3{font-size:var(--fs-24)}\n}\n\n/* ---- Show/hide language switch (tweak) ---- */\nbody.hide-lang .lang-switch{display:none !important}\n\n/* =====================================================================\n   Tweaks panel (injected by site.js) — on-brand: square, mono labels\n   ===================================================================== */\n#bc-tweak-btn{\n  position:fixed;right:18px;bottom:18px;z-index:200;\n  width:48px;height:48px;border:1px solid var(--c-black);background:var(--c-white);\n  cursor:pointer;display:flex;align-items:center;justify-content:center;\n  font-family:var(--f-mono);font-size:18px;color:var(--c-black);\n  box-shadow:0 2px 0 var(--c-black);transition:transform var(--dur-fast) ease;\n}\n#bc-tweak-btn:hover{transform:translateY(-2px)}\n#bc-tweak-panel{\n  position:fixed;right:18px;bottom:78px;z-index:200;width:288px;\n  background:var(--c-white);border:1px solid var(--c-black);box-shadow:0 6px 0 rgba(0,0,0,.12);\n  padding:var(--spacing-20);display:none;\n}\n#bc-tweak-panel.open{display:block}\n#bc-tweak-panel .tk-head{display:flex;justify-content:space-between;align-items:baseline;\n  margin-bottom:var(--spacing-20)}\n#bc-tweak-panel .tk-head strong{font-family:var(--f-serif);font-size:var(--fs-20);font-weight:var(--fw-regular)}\n#bc-tweak-panel .tk-head button{background:none;border:0;cursor:pointer;font-family:var(--f-mono);font-size:16px}\n#bc-tweak-panel .tk-row{margin-bottom:var(--spacing-20)}\n#bc-tweak-panel .tk-row:last-child{margin-bottom:0}\n#bc-tweak-panel label.tk-label{display:block;font-family:var(--f-sans);font-size:var(--fs-12);\n  text-transform:uppercase;letter-spacing:.08em;font-weight:var(--fw-medium);color:var(--c-slate-1);\n  margin-bottom:.6rem}\n#bc-tweak-panel .tk-swatches{display:flex;gap:.5rem}\n#bc-tweak-panel .tk-swatches button{width:30px;height:30px;border:1px solid var(--c-black);cursor:pointer;padding:0}\n#bc-tweak-panel .tk-swatches button[aria-pressed=\"true\"]{outline:2px solid var(--c-black);outline-offset:2px}\n#bc-tweak-panel input[type=range]{width:100%;accent-color:var(--c-black)}\n#bc-tweak-panel .tk-toggle{display:flex;align-items:center;justify-content:space-between;gap:1rem}\n#bc-tweak-panel .tk-toggle button{\n  border:1px solid var(--c-black);background:var(--c-white);cursor:pointer;\n  font-family:var(--f-sans);font-size:var(--fs-12);text-transform:uppercase;letter-spacing:.04em;\n  padding:.35rem .7rem;font-weight:var(--fw-medium)}\n#bc-tweak-panel .tk-toggle button[aria-pressed=\"true\"]{background:var(--c-yellow);color:var(--c-black)}\n#bc-tweak-panel .tk-val{font-family:var(--f-mono);font-size:var(--fs-12);color:var(--c-slate-1)}\n@media print{#bc-tweak-btn,#bc-tweak-panel{display:none !important}}\n\n/* =====================================================================\n   Motion & polish (editorial / institutional feel)\n   ===================================================================== */\n\n/* Yellow scroll-progress bar */\n#bc-progress{\n  position:fixed;top:0;left:0;height:3px;width:0;background:var(--c-yellow);\n  z-index:300;transition:width .08s linear;\n}\n@media print{#bc-progress{display:none !important}}\n\n/* Header gains quiet elevation once you scroll
