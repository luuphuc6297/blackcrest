<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--color-bg-level-1); font-family: var(--font-regular); }
  .wrap { display: flex; gap: 18px; align-items: flex-start; flex-wrap: wrap; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Card, Tabs, Avatar, Badge } = window.BlackcrestDesignSystem_e9728c;
    function Demo() {
      const [tab, setTab] = React.useState("all");
      return (
        <div className="wrap">
          <Card title="Hiệu suất danh mục" subtitle="Quý III · 2026" action={<Badge tone="success">+8,42%</Badge>} style={{width:300}}>
            <div style={{fontFamily:"var(--font-monospace)",fontSize:28,fontWeight:500,color:"var(--color-text-primary)"}}>₫ 1.284.500.000</div>
            <div style={{display:"flex",gap:-8,marginTop:16}}>
              {["Nguyễn Minh Anh","Trần Quốc Bảo","Lê Thu Hà"].map((n,i)=>(
                <Avatar key={n} name={n} size={30} style={{marginLeft:i?-8:0,boxShadow:"0 0 0 2px var(--color-bg-primary)"}} />
              ))}
            </div>
          </Card>
          <Card style={{width:320,padding:0}}>
            <div style={{padding:"0 16px"}}>
              <Tabs value={tab} onChange={setTab} items={[
                {value:"all",label:"Tất cả",badge:128},
                {value:"review",label:"Chờ duyệt",badge:7},
                {value:"published",label:"Đã phát hành"},
              ]} />
            </div>
            <div style={{padding:16,fontSize:"var(--font-size-small)",color:"var(--color-text-tertiary)"}}>
              Đang xem: <b style={{color:"var(--color-text-primary)"}}>{tab}</b>
            </div>
          </Card>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
