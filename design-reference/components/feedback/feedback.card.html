<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--color-bg-primary); font-family: var(--font-regular); }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 18px; }
  .lbl { font-size: var(--font-size-mini); color: var(--color-text-tertiary); width: 70px; flex: none; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Badge, Tag, Tooltip, Toast, IconButton } = window.BlackcrestDesignSystem_e9728c;
    const Ic = ({n,s=16}) => <i data-lucide={n} style={{width:s,height:s}} />;
    function Demo() {
      return (
        <div>
          <div className="row">
            <span className="lbl">Status</span>
            <Badge tone="draft" dot>Nháp</Badge>
            <Badge tone="review" dot>Chờ duyệt</Badge>
            <Badge tone="approved" dot>Đã duyệt</Badge>
            <Badge tone="published" dot>Đã phát hành</Badge>
            <Badge tone="rejected" dot>Từ chối</Badge>
          </div>
          <div className="row">
            <span className="lbl">Tags</span>
            <Tag>Quỹ Cân bằng</Tag>
            <Tag leadingIcon={<Ic n="calendar" />}>Quý III 2026</Tag>
            <Tag onRemove={() => {}}>Bộ lọc: Q3</Tag>
            <Tooltip content="Tải xuống PDF" side="right">
              <IconButton label="Tải"><Ic n="download" s={18} /></IconButton>
            </Tooltip>
          </div>
          <div className="row">
            <Toast tone="success" icon={<Ic n="check-circle-2" s={18} />} title="Đã phát hành báo cáo" message="Gửi tới 248 nhà đầu tư." onClose={() => {}} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
  </script>
</body>
</html>
