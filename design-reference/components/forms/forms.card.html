<!-- @dsCard group="Components" viewport="700x560" name="Forms" subtitle="Input, Select, Checkbox, Switch — trong một form panel" -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--color-bg-level-1); font-family: var(--font-regular); }
  .panel { max-width: 560px; margin: 0 auto; background: var(--color-bg-primary); border: 1px solid var(--color-border-primary); border-radius: var(--radius-card-lg); box-shadow: var(--shadow-low); overflow: hidden; }
  .phead { padding: 18px 22px; border-bottom: 1px solid var(--color-border-primary); }
  .ptitle { font-size: var(--font-size-large); font-weight: var(--font-weight-semibold); letter-spacing: -0.012em; color: var(--color-text-primary); }
  .psub { font-size: var(--font-size-small); color: var(--color-text-tertiary); margin-top: 3px; }
  .pbody { padding: 22px; display: flex; flex-direction: column; gap: 18px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .seclabel { font-size: var(--font-size-mini); font-weight: var(--font-weight-medium); letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-text-quaternary); }
  .divider { height: 1px; background: var(--color-border-primary); margin: 2px 0; }
  .toggles { display: flex; flex-direction: column; gap: 14px; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; }
  .toggle-row .meta { display: flex; flex-direction: column; gap: 1px; }
  .toggle-row .t { font-size: var(--font-size-regular); font-weight: var(--font-weight-medium); color: var(--color-text-primary); }
  .toggle-row .d { font-size: var(--font-size-small); color: var(--color-text-tertiary); }
  .pfoot { padding: 14px 22px; background: var(--color-bg-level-1); border-top: 1px solid var(--color-border-primary); display: flex; justify-content: flex-end; gap: 8px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Input, Select, Checkbox, Switch, Button } = window.BlackcrestDesignSystem_e9728c;
    const Ic = ({n}) => <i data-lucide={n} style={{width:16,height:16}} />;
    function Demo() {
      return (
        <div className="panel">
          <div className="phead">
            <div className="ptitle">Hồ sơ thành viên</div>
            <div className="psub">Thông tin tài khoản và tuỳ chọn thông báo.</div>
          </div>
          <div className="pbody">
            <div className="grid2">
              <Input label="Họ và tên" placeholder="Nguyễn Minh Anh" leadingIcon={<Ic n="user" />} defaultValue="Nguyễn Minh Anh" />
              <Input label="Email công việc" type="email" placeholder="ten@quy.vn" leadingIcon={<Ic n="mail" />} defaultValue="minh.anh@blackcrest.vn" />
            </div>
            <div className="grid2">
              <Select label="Vai trò" defaultValue="EDITOR">
                <option value="SUPER_ADMIN">Quản trị tối cao</option>
                <option value="EDITOR">Biên tập viên</option>
                <option value="APPROVER">Người duyệt</option>
              </Select>
              <Input label="Mật khẩu" type="password" error="Tối thiểu 8 ký tự" defaultValue="••••" />
            </div>
            <div className="divider"></div>
            <div className="seclabel">Tuỳ chọn</div>
            <div className="toggles">
              <div className="toggle-row">
                <div className="meta"><span className="t">Thông báo qua email</span><span className="d">Nhận email khi có báo cáo mới cần duyệt.</span></div>
                <Switch defaultChecked />
              </div>
              <div className="toggle-row">
                <div className="meta"><span className="t">Xác thực hai lớp</span><span className="d">Bảo mật tài khoản bằng mã OTP.</span></div>
                <Switch />
              </div>
            </div>
            <Checkbox label="Tôi đồng ý với điều khoản sử dụng của Blackcrest" defaultChecked />
          </div>
          <div className="pfoot">
            <Button variant="ghost">Huỷ</Button>
            <Button variant="primary">Lưu thay đổi</Button>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
  </script>
</body>
</html>
