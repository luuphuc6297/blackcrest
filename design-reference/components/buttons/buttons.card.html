<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 28px; background: var(--color-bg-primary); font-family: var(--font-regular); }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
  .lbl { font-size: var(--font-size-micro); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.07em; color: var(--color-text-quaternary); width: 90px; flex: none; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, IconButton } = window.BlackcrestDesignSystem_e9728c;
    const Ic = ({n, s=16}) => <i data-lucide={n} style={{width:s, height:s}} />;
    function Demo() {
      return (
        <div>
          <div className="row">
            <span className="lbl">Biến thể</span>
            <Button variant="primary" trailingIcon={<Ic n="arrow-right" s={15} />}>Yêu cầu truy cập</Button>
            <Button variant="secondary" leadingIcon={<Ic n="download" s={15} />}>Tải PDF</Button>
            <Button variant="ghost">Huỷ</Button>
            <Button variant="danger">Xoá</Button>
          </div>
          <div className="row">
            <span className="lbl">Kích thước</span>
            <Button size="sm">Nhỏ</Button>
            <Button size="md">Vừa</Button>
            <Button size="lg" trailingIcon={<Ic n="arrow-right" s={16} />}>Lớn</Button>
            <Button loading>Đang xử lý</Button>
            <Button disabled>Vô hiệu</Button>
          </div>
          <div className="row">
            <span className="lbl">Icon</span>
            <IconButton label="Phóng to"><Ic n="zoom-in" s={18} /></IconButton>
            <IconButton label="Bộ lọc" variant="secondary"><Ic n="sliders-horizontal" s={18} /></IconButton>
            <IconButton label="Đánh dấu" active><Ic n="bookmark" s={18} /></IconButton>
            <IconButton label="Thêm" variant="primary"><Ic n="plus" s={18} /></IconButton>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
  </script>
</body>
</html>
