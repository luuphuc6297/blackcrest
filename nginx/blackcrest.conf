# Blackcrest — nginx (blueprint §5). TLS termination, rate-limit on auth,
# upload size cap, and a reverse proxy to the Next.js standalone server.

# Brute-force protection for the auth endpoints (blueprint §6.3).
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
# General scrape protection for PDF view/download (blueprint §6.9).
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

upstream blackcrest_web {
    # Blue/green: flip between web_blue:3000 / web_green:3000 here.
    server web:3000;
}

server {
    listen 80;
    server_name _;

    # ACME challenge for certbot webroot renewal.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    # Redirect everything else to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # certbot-managed certificates (mounted from ./nginx/certbot/conf).
    ssl_certificate     /etc/letsencrypt/live/blackcrest/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blackcrest/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Uploads (PDF) — blueprint §5 (client_max_body_size 12m).
    client_max_body_size 12m;

    # Security headers.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://blackcrest_web;
        include /etc/nginx/proxy_params_blackcrest.conf;
    }

    location ~ ^/api/reports/.+/(view|download) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://blackcrest_web;
        include /etc/nginx/proxy_params_blackcrest.conf;
        proxy_buffering off; # stream PDFs through
    }

    location / {
        proxy_pass http://blackcrest_web;
        include /etc/nginx/proxy_params_blackcrest.conf;
    }
}
