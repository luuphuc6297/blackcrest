name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    # Ephemeral Postgres — validates `migrate deploy` and is ready for future
    # DB-integration tests. CI never touches the real (Supabase/prod) database.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: blackcrest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/blackcrest_test?schema=public
      DIRECT_URL: postgresql://test:test@localhost:5432/blackcrest_test?schema=public
      AUTH_SECRET: ci-auth-secret-which-is-long-enough
      DOWNLOAD_TOKEN_SECRET: ci-download-secret-long-enough-32
      AUTH_TRUST_HOST: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm db:generate

      - name: Apply migrations (validates migrate deploy)
        run: pnpm exec prisma migrate deploy

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
