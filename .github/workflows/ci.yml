name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    # Ephemeral Postgres — validates `migrate deploy` and is ready for future
    # DB-integration tests. CI never touches the real (Supabase/prod) database.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: blackcrest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/blackcrest_test?schema=public
      DIRECT_URL: postgresql://test:test@localhost:5432/blackcrest_test?schema=public
      AUTH_SECRET: ci-auth-secret-which-is-long-enough
      DOWNLOAD_TOKEN_SECRET: ci-download-secret-long-enough-32
      AUTH_TRUST_HOST: "true"
      # Enables the real-Postgres integration tests (src/**/*.integration.test.ts);
      # they run against the ephemeral service above, after migrate deploy.
      INTEGRATION: "1"

    steps:
      # Action majors pinned to current node24 runtimes (older node20-runtime
      # actions are deprecated on GitHub-hosted runners — Sept 2025 changelog).
      - uses: actions/checkout@v5

      # No `version:` here on purpose — pnpm/action-setup reads the version from
      # package.json's `packageManager` field (the single source of truth). Passing
      # both errors with ERR_PNPM_BAD_PM_VERSION ("Multiple versions of pnpm specified").
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm db:generate

      - name: Apply migrations (validates migrate deploy)
        run: pnpm exec prisma migrate deploy

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
